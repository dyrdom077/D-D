<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D&D 5e — Лист персонажа</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap');

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #c8bfb0;
    --border-light: #ddd8ce;
    --text: #2c2418;
    --text-muted: #7a6e60;
    --text-label: #9a8e80;
    --accent: #5c4a2a;
    --accent-light: #8b6f3e;
    --accent-gold: #c4a35a;
    --accent-red: #8b2222;
    --shadow: rgba(92,74,42,0.12);
    --radius: 4px;
    --checked-bg: #2c2418;
    --grid-color: rgba(92,74,42,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.4;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px; /* Место под кнопку сохранить */
  }

  .grid-bg {
    background-color: var(--surface);
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .label {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-label);
    display: block;
    text-align: center;
  }
  .block-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    background: var(--surface);
    padding: 0 6px;
  }

  input[type="text"], input[type="number"], textarea {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    width: 100%;
  }
  input[type="number"] { -moz-appearance: textfield; text-align: center; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  textarea { resize: none; font-size: 12px; line-height: 1.5; }

  .block {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    position: relative;
  }
  .block-header {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 1;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .header-section {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .header-fields-left, .header-fields-right {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .header-field {
    border-bottom: 1px solid var(--border);
    padding: 2px 4px;
  }
  .header-field input {
    font-size: 12px;
    color: var(--text);
  }
  .header-field .label { text-align: left; font-size: 7px; }

  .level-circle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .level-ring {
    width: 72px;
    height: 72px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    box-shadow: inset 0 1px 3px var(--shadow), 0 2px 6px var(--shadow);
  }
  .level-ring input {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    width: 50px;
    text-align: center;
  }
  .xp-box {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 12px;
    text-align: center;
    background: var(--surface);
  }
  .xp-box input { font-size: 11px; width: 60px; text-align: center; }

  .main-grid {
    display: grid;
    grid-template-columns: 145px 1fr;
    gap: 8px;
  }
  .left-col { display: flex; flex-direction: column; gap: 8px; }

  .prof-block {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px 8px;
    text-align: center;
    position: relative;
  }
  .prof-block .block-header { top: -8px; }
  .prof-value {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 2px 8px;
    display: inline-block;
    min-width: 48px;
    text-align: center;
  }
  .prof-value input {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    width: 48px;
  }

  .ability-block {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 6px 8px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .ability-block .block-header { top: -9px; }
  .ability-scores { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .modifier-box {
    width: 50px; height: 50px; border: 2px solid var(--border); border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 2px var(--shadow);
  }
  .modifier-box input {
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600; color: var(--accent);
    width: 46px; pointer-events: none;
  }
  .score-box {
    width: 28px; height: 28px; border: 1px solid var(--border); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
  }
  .score-box input { font-size: 13px; font-weight: 600; color: var(--text); width: 26px; }

  .skill-list { width: 100%; display: flex; flex-direction: column; gap: 2px; }
  .skill-row { display: flex; align-items: center; gap: 4px; padding: 1px 0; }
  .skill-check {
    width: 13px; height: 13px; border: 1.5px solid var(--border); border-radius: 50%;
    flex-shrink: 0; cursor: pointer; transition: background 0.15s, border-color 0.15s;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .skill-check.checked { background: var(--checked-bg); border-color: var(--checked-bg); }
  .skill-check.checked::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff; }
  .skill-name { font-size: 10px; color: var(--text-muted); flex: 1; cursor: default; }
  .skill-val { width: 24px; height: 16px; border-bottom: 1px solid var(--border-light); text-align: center; }
  .skill-val input { font-size: 10px; width: 22px; color: var(--accent); }

  .right-col { display: flex; flex-direction: column; gap: 8px; }
  .combat-row { display: grid; grid-template-columns: auto 1fr auto auto; gap: 8px; align-items: start; }

  .ac-shield { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .shield-shape {
    width: 52px; height: 58px; background: var(--surface); border: 2px solid var(--border);
    clip-path: polygon(10% 0%, 90% 0%, 100% 15%, 100% 60%, 50% 100%, 0% 60%, 0% 15%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .shield-shape input { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--accent); width: 40px; text-align: center; }

  .hp-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px 8px; position: relative; flex: 1; }
  .hp-main-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .hp-field { flex: 1; text-align: center; border-bottom: 1px solid var(--border); }
  .hp-field input { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: var(--accent); width: 100%; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .stat-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 4px 6px; text-align: center; position: relative; }
  .stat-box input { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: var(--accent); width: 100%; }

  .text-block { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
  .text-block-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .text-block-body { flex: 1; padding: 6px; }
  .text-block-body textarea {
    width: 100%; min-height: 120px; font-size: 12px; color: var(--text); line-height: 20px;
    background-image: linear-gradient(var(--grid-color) 1px, transparent 1px);
    background-size: 100% 20px; background-attachment: local; padding: 0 2px;
  }

  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .title-bar { text-align: center; padding: 4px 0; position: relative; }
  .title-bar::before, .title-bar::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: var(--border); }
  .title-bar::before { left: 0; }
  .title-bar::after { right: 0; }
  .title-bar h1 { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); display: inline; background: var(--bg); padding: 0 10px; }

  .save-btn {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; border: none; padding: 14px 28px;
    border-radius: 8px; font-family: 'Cinzel', serif; font-size: 16px; font-weight: bold;
    text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; cursor: pointer;
  }

  .coins-row { display: flex; gap: 4px; justify-content: space-between; margin-bottom: 5px; }
  .coin-box { display: flex; align-items: center; gap: 2px; border: 1px solid var(--border); padding: 2px 4px; border-radius: 3px; background: var(--surface); }
  .coin-box input { width: 30px; font-size: 11px; text-align: center; }
  .coin-box span { font-size: 9px; color: var(--accent-gold); font-weight: bold; }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
    .combat-row { grid-template-columns: auto 1fr auto; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="title-bar"><h1>D&D Nexus</h1></div>

  <div class="header-section">
    <div class="header-fields-left">
      <div class="header-field"><span class="label">Имя персонажа</span><input type="text" id="charName" placeholder="—"></div>
      <div class="header-field"><span class="label">Предыстория</span><input type="text" id="charBackground" placeholder="—"></div>
      <div class="header-field"><span class="label">Вид</span><input type="text" id="charRace" placeholder="—"></div>
    </div>
    <div class="level-circle">
      <div class="level-ring"><input type="number" id="level" value="1" min="1" max="20"></div>
      <span class="label" style="font-size:7px;">Уровень</span>
    </div>
    <div class="header-fields-right">
      <div class="header-field"><span class="label">Класс</span><input type="text" id="charClass" placeholder="—"></div>
      <div class="header-field"><span class="label">Подкласс</span><input type="text" id="charSubclass" placeholder="—"></div>
      <div class="header-field"><span class="label">Мировоззрение</span><input type="text" id="charAlignment" placeholder="—"></div>
    </div>
  </div>

  <div class="main-grid">
    <div class="left-col">
      <div class="prof-block">
        <div class="block-header"><span class="block-title">Бонус владения</span></div>
        <div class="prof-value"><input type="text" id="prof-bonus" value="+2" style="width:48px;" readonly></div>
      </div>

      <div class="ability-block" data-ability="str">
        <div class="block-header"><span class="block-title">Сила</span></div>
        <div class="ability-scores">
          <div class="modifier-box"><input type="text" class="mod-display" value="+0" readonly></div>
          <div class="score-box"><input type="number" id="str" class="score-input calc-trigger" value="10"></div>
        </div>
        <div class="skill-list">
          <div class="skill-row"><div class="skill-check" id="save-str" onclick="toggleCheck(this)"></div><span class="skill-name">Спасбросок</span><div class="skill-val"><input type="text" id="val-save-str" class="skill-computed" readonly></div></div>
          <div class="skill-row"><div class="skill-check" id="skill-athletics" onclick="toggleCheck(this)"></div><span class="skill-name">Атлетика</span><div class="skill-val"><input type="text" id="val-skill-athletics" class="skill-computed" readonly></div></div>
        </div>
      </div>

      <div class="ability-block" data-ability="dex">
        <div class="block-header"><span class="block-title">Ловкость</span></div>
        <div class="ability-scores">
          <div class="modifier-box"><input type="text" class="mod-display" value="+0" readonly></div>
          <div class="score-box"><input type="number" id="dex" class="score-input calc-trigger" value="10"></div>
        </div>

          <div class="skill-row"><div class="skill-
