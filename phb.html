<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Книга Игрока (PHB)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100vh; overflow: hidden; background-color: #0b0f19; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .close-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

    <iframe src="https://drive.google.com/file/d/1WhQY3_3Cl7MTCFauAJTXaH7LW1WREPtX/view?usp=drive_link/preview"></iframe>

    <button class="close-btn" onclick="Telegram.WebApp.close()">Закрыть книгу</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
